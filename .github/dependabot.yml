version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    timezone: Etc/UTC
  # Wait before proposing a freshly-published release, so a compromised or
  # yanked version isn't pulled in the moment it lands.
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
  reviewers:
  - str4d
  assignees:
  - str4d
  labels:
  - "A-CI"
