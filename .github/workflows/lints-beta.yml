name: Beta lints

# These lints are only informative, so we only run them directly on branches
# and not trial-merges of PRs, to reduce noise.
on: push

jobs:
  clippy-beta:
    name: Clippy (beta)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # check out the (private) repository
      checks: write # post Clippy annotations as a check run

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
        with:
          nightly-features: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-05-31
        id: toolchain
        with:
          toolchain: beta
          components: clippy # auguwu/clippy-action expects clippy already installed
      - run: rustup override set "${TOOLCHAIN}"
        shell: sh
        env:
          TOOLCHAIN: ${{steps.toolchain.outputs.name}}
      - name: Run Clippy (beta)
        uses: auguwu/clippy-action@9817d076b82df0194935be9db6154c56ac07b317 # 1.5.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # cargo-level flags go in `check-args` (before the `--`); lint levels
          # go in `deny`/`warn` (the action places them after the `--`).
          check-args: >
            ${{ steps.prepare.outputs.feature-flags }}
            --all-targets
          warn: clippy::all
